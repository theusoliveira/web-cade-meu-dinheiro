<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>Sem conexão — Cadê meu dinheiro?</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
        padding: calc(env(safe-area-inset-top) + 24px) 20px calc(env(safe-area-inset-bottom) + 24px);
        background: #0a0a0a;
        color: #fff;
      }
      .card {
        max-width: 520px;
        margin: 0 auto;
        border: 1px solid rgba(255,255,255,.14);
        border-radius: 18px;
        padding: 18px;
        background: rgba(255,255,255,.06);
      }
      .muted { opacity: .78; line-height: 1.4; }
      button {
        margin-top: 14px;
        border: 0;
        border-radius: 12px;
        padding: 10px 14px;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1 style="margin:0 0 8px 0;font-size:18px;">Você está sem conexão</h1>
      <p class="muted" style="margin:0;">
        Quando a internet voltar, você poderá usar o app normalmente.
      </p>
      <button onclick="location.reload()">Tentar novamente</button>
    </div>
  </body>
</html>
